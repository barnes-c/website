name: ci

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
    branches: [master]

env:
  APP_NAME: website
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: 1.3.10

      - name: Install
        run: bun install --no-progress

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  build:
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: 1.3.10

      - name: Install
        run: bun install --no-progress

      - name: Build
        run: bun run build

  package_pr:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Compute image
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # same-repo PRs only
      - name: Login to GHCR
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Build always. Push only if login ran.
      - name: Build multi-arch (PR)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          tags: |
            ${{ steps.meta.outputs.image }}:sha-${{ steps.vars.outputs.short_sha }}
            ${{ steps.meta.outputs.image }}:pr-${{ github.event.number }}
          build-args: |
            BUILD_TIMESTAMP=${{ github.event.pull_request.updated_at }}
            COMMIT_HASH=${{ steps.vars.outputs.short_sha }}
            VERSION=pr-${{ github.event.number }}
            IMAGE_NAME=${{ env.APP_NAME }}
            IMAGE_URL_BASE=github.com/${{ github.repository_owner }}
          annotations: |
            index:org.opencontainers.image.authors=https://github.com/${{ github.repository_owner }}
            index:org.opencontainers.image.created=${{ github.event.pull_request.updated_at }}
            index:org.opencontainers.image.description=Website for https://barnes.biz
            index:org.opencontainers.image.documentation=https://barnes.biz
            index:org.opencontainers.image.licenses=GPL-3.0-only
            index:org.opencontainers.image.ref.name=pr-${{ github.event.number }}
            index:org.opencontainers.image.revision=${{ github.sha }}
            index:org.opencontainers.image.source=https://github.com/${{ github.repository }}.git
            index:org.opencontainers.image.title=${{ env.APP_NAME }}
            index:org.opencontainers.image.url=https://github.com/${{ github.repository }}
            index:org.opencontainers.image.vendor=Barnes-C
            index:org.opencontainers.image.version=pr-${{ github.event.number }}

  package_release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch (tag)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.ref_name }}
          build-args: |
            BUILD_TIMESTAMP=${{ github.event.repository.updated_at }}
            COMMIT_HASH=${{ github.sha }}
            VERSION=${{ github.ref_name }}
            IMAGE_NAME=${{ env.APP_NAME }}
            IMAGE_URL_BASE=github.com/${{ github.repository_owner }}
          annotations: |
            index:org.opencontainers.image.authors=https://github.com/${{ github.repository_owner }}
            index:org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            index:org.opencontainers.image.description=Website for https://barnes.biz
            index:org.opencontainers.image.documentation=https://barnes.biz
            index:org.opencontainers.image.licenses=GPL-3.0-only
            index:org.opencontainers.image.ref.name=${{ github.ref_name }}
            index:org.opencontainers.image.revision=${{ github.sha }}
            index:org.opencontainers.image.source=https://github.com/${{ github.repository }}.git
            index:org.opencontainers.image.title=${{ env.APP_NAME }}
            index:org.opencontainers.image.url=https://github.com/${{ github.repository }}
            index:org.opencontainers.image.vendor=Barnes-C
            index:org.opencontainers.image.version=${{ github.ref_name }}
